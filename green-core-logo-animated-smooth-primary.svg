<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 690" role="img" aria-label="Green Core smooth animated (primary)">
  <title>Green Core smooth animated (primary)</title>
  <style><![CDATA[
    /* Smooth continuous: bloom once + ambient breath/sway forever.
       Wordmark fades in with the leaves and stays visible (with a subtle pulse). */
    @keyframes gc-bloom {
      0%   { opacity: 0; transform: scale(0); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes gc-veins-in {
      0%, 60% { opacity: 0; }
      100%    { opacity: 0.55; }
    }
    @keyframes gc-breath {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.025); }
    }
    @keyframes gc-sway {
      0%, 100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate(1.5deg); }
    }
    @keyframes gc-wm-in {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes gc-wm-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.92; }
    }

    .rosette {
      transform-origin: 0px 0px;
      animation: gc-sway 9s ease-in-out infinite;
    }
    .gc-leaf {
      transform-origin: 0px 0px;
      opacity: 0;
      animation:
        gc-bloom 1.4s cubic-bezier(0.22, 0.61, 0.36, 1) forwards,
        gc-breath 5s ease-in-out infinite 1.6s;
    }
    .gc-veins {
      opacity: 0;
      animation: gc-veins-in 1.6s ease-out forwards;
    }
    .gc-leaf.d1 { animation-delay: 0s,    1.6s; animation-duration: 1.4s, 5.0s; }
    .gc-leaf.d2 { animation-delay: 0.11s, 1.6s; animation-duration: 1.4s, 5.3s; }
    .gc-leaf.d3 { animation-delay: 0.22s, 1.6s; animation-duration: 1.4s, 4.8s; }
    .gc-leaf.d4 { animation-delay: 0.33s, 1.6s; animation-duration: 1.4s, 5.2s; }
    .gc-leaf.d5 { animation-delay: 0.44s, 1.6s; animation-duration: 1.4s, 4.9s; }
    .gc-leaf.d6 { animation-delay: 0.55s, 1.6s; animation-duration: 1.4s, 5.4s; }
    .gc-veins.d1 { animation-delay: 0.30s; }
    .gc-veins.d2 { animation-delay: 0.41s; }
    .gc-veins.d3 { animation-delay: 0.52s; }
    .gc-veins.d4 { animation-delay: 0.63s; }
    .gc-veins.d5 { animation-delay: 0.74s; }
    .gc-veins.d6 { animation-delay: 0.85s; }

    /* Wordmark: fades in once, then has a very subtle continuous pulse */
    .wm-anim-green, .wm-anim-core {
      opacity: 0;
      animation:
        gc-wm-in    0.9s ease-out forwards,
        gc-wm-pulse 6s ease-in-out infinite 1.5s;
    }
    .wm-anim-green { animation-delay: 0.9s, 1.5s; }
    .wm-anim-core  { animation-delay: 1.15s, 1.7s; }

    @media (prefers-reduced-motion: reduce) {
      *         { animation: none !important; }
      .gc-leaf  { opacity: 1; transform: none; }
      .gc-veins { opacity: 0.55; }
      .rosette  { transform: none; }
      .wm-anim-green, .wm-anim-core { opacity: 1; }
    }
  ]]></style>
